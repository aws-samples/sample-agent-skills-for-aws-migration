# mise.toml - Tool versions and tasks
# See: https://mise.jdx.dev

min_version = "2026.2.4"

[tools]
node = "24"
"npm:markdownlint-cli2" = "0.17"
"npm:dprint" = "0.51"
"pipx:pre-commit" = "4"
"pipx:bandit[sarif]" = "1"
"pipx:checkov" = "3"
"pipx:semgrep" = "1.151.0"
"grype" = "0.107.1"
"gitleaks" = "8.30.0"

# ======================
# LINTING & FORMATTING
# ======================

[tasks.fmt]
description = "Format all files"
run = "dprint fmt"

[tasks."fmt:check"]
description = "Check formatting (CI)"
run = "dprint check"

[tasks."lint:md"]
description = "Lint Markdown files"
run = "markdownlint-cli2 '**/*.md' '#node_modules' '#.git'"

[tasks."lint:md:fix"]
description = "Lint Markdown files with auto-fix"
run = "markdownlint-cli2 '**/*.md' '#node_modules' --fix"

[tasks."lint:manifests"]
description = "Validate JSON manifests for all platforms"
run = "node tools/validate-manifests.mjs"

[tasks."lint:cross-refs"]
description = "Validate cross-references between marketplace and plugin manifests"
run = "node tools/validate-cross-refs.mjs"

[tasks.lint]
description = "Run all linters"
run = [
    { task = "lint:md" },
    { task = "lint:manifests" },
    { task = "lint:cross-refs" },
]

# =============
# VALIDATION
# =============

[tasks.validate]
description = "Run all validation checks"
run = "echo 'All validations passed'"

# =========
# SECURITY
# =========

[tasks."security:bandit"]
description = "Run Bandit"
run = [
  "bandit -r ."
]

[tasks."security:semgrep"]
description = "Run SemGrep OSS"
run = [
  "semgrep scan --quiet --oss-only --metrics=off --config=r/all --max-log-list-entries=0 --exclude-rule='ai.generic.detect-generic-ai-anthprop.detect-generic-ai-anthprop' --exclude-rule='ai.generic.detect-generic-ai-oai.detect-generic-ai-oai'"
]

[tasks."security:checkov"]
description = "Run Checkov"
run = [
  "checkov --quiet --directory ."
]

[tasks."security:gitleaks"]
description = "Run GitLeaks"
run = [
  "gitleaks git --config=.gitleaks.toml --baseline-path=.gitleaks-baseline.json"
]

[tasks."security:grype"]
description = "Run Grype"
run = [
  "grype ."
]

[tasks.security]
description = "Run security scans"
run = [
    { task = "security:bandit" },
    { task = "security:semgrep" },
    { task = "security:gitleaks" },
    { task = "security:checkov" },
    { task = "security:grype" },
]

# ===============
# BUILD PROCESS
# ===============

[tasks.build]
description = "Complete build: lint, format, validate, security scans"
run = [
    { task = "lint" },
    { task = "fmt:check" },
    { task = "validate" },
    { task = "security" },
]
